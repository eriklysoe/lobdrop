services:
  lobdrop:
    build: .
    container_name: lobdrop
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /home/erik/lobdrop-repo/uploads:/data/uploads
      - /home/erik/lobdrop-repo/db:/data/db
    environment:
      - PORT=3000
      - BASE_URL=${BASE_URL:-http://localhost:3000}
      - MAX_FILE_SIZE_MB=100
      - FILE_EXPIRY_DAYS=7
      - ADMIN_USER=admin
      - ADMIN_PASS=testing
      - SECRET_KEY=altofordrlkjdsokij
      - CORS_ORIGIN=*
      - PUID=1000
      - PGID=1000
      # SMTP (uncomment to enable email invites)
      # - SMTP_HOST=smtp.example.com
      # - SMTP_PORT=587
      # - SMTP_USER=user@example.com
      # - SMTP_PASS=password
      # - SMTP_FROM=noreply@example.com
      # - SMTP_SECURE=false

volumes:
  uploads:
  db:
