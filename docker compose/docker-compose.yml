services:
  lobdrop:
    image: eriklysoe/lobdrop:v1.1
    container_name: lobdrop
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - uploads:/data/uploads
      - db:/data/db
    env_file: .env
    environment:
      - PORT=3000
      - BASE_URL=${BASE_URL:-http://localhost:3000}
      - MAX_FILE_SIZE_MB=100
      - FILE_EXPIRY_DAYS=7
      - ADMIN_USER=admin
      - ADMIN_PASS=${ADMIN_PASS:?ADMIN_PASS must be set in .env}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env (min 32 chars)}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - TRUST_PROXY=${TRUST_PROXY:-false}
      - PUID=1000
      - PGID=1000
      # SMTP (uncomment to enable email invites)
      # - SMTP_HOST=smtp.example.com
      # - SMTP_PORT=587
      # - SMTP_USER=user@example.com
      # - SMTP_PASS=password
      # - SMTP_FROM=noreply@example.com
      # - SMTP_SECURE=false

volumes:
  uploads:
  db:
